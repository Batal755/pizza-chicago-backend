services:
  postgres:
    image: postgres:16
    container_name: pizza_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: pizza
      POSTGRES_PASSWORD: pizza
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - pizza_pg:/var/lib/postgresql/data
      - ./infra/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pizza']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pizza_pg:
